<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />

  <style>
    /* =============================================================
       CSS VARIABLES
       ============================================================= */
    :root {
      --bg: #F7F8FA;
      --bg-alt: #F5F5F7;
      --fg: #111111;
      --muted: #6E6E73;
      --card-bg: rgba(255, 255, 255, 0.72);
      --card-border: rgba(0, 0, 0, 0.06);
      --blue-soft: #DDEBFF;
      --purple-soft: #E7DDFB;
      --green-soft: #DDEFE6;
      --warm: #EFE7DC;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.08);
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 28px;
      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
      --font-mono: 'SF Mono', ui-monospace, 'Menlo', 'Monaco', monospace;
      --nav-h: 52px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.6;
      color: var(--fg);
      background: var(--bg);
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button { font: inherit; cursor: pointer; border: none; background: none; }

    /* Nav */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
      background: rgba(247, 248, 250, 0.78);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s, background 0.3s;
    }
    .nav.scrolled { border-bottom-color: rgba(0, 0, 0, 0.06); background: rgba(247, 248, 250, 0.88); }
    .nav-logo { font-family: var(--font-display); font-size: 17px; font-weight: 600; letter-spacing: -0.01em; color: var(--fg); }
    .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; }
    .nav-links a { font-size: 14px; font-weight: 500; letter-spacing: -0.01em; color: var(--muted); transition: color 0.2s; }
    .nav-links a:hover { color: var(--fg); }
    .nav-lang {
      font-size: 12px; font-weight: 500; letter-spacing: 0.04em;
      color: var(--muted); padding: 4px 10px;
      border: 1px solid rgba(0,0,0,0.12); border-radius: 6px;
      cursor: pointer; user-select: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .nav-lang:hover { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.2); }

    /* Section */
    .section { max-width: 1040px; margin: 0 auto; padding: 100px 40px; }
    .section.has-bg { background: rgba(247,248,250,0.92); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border-radius: var(--radius-lg); margin-bottom: 40px; }
    .main-content { position: relative; z-index: 3; }
    .section-bg { background: rgba(247,248,250,0.72); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-radius: var(--radius-lg); padding: 40px; }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 600; letter-spacing: -0.025em; line-height: 1.12;
      color: var(--fg); margin-bottom: 16px;
    }

    /* Hero */
    .hero {
      position: relative; z-index: 2;
      display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: flex-start;
      min-height: 100vh; padding-top: calc(var(--nav-h) + 64px);
      max-width: 1040px; margin: 0 auto; padding-left: 40px; padding-right: 40px;
    }
    .hero-bg-video {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0;
      object-fit: cover; will-change: transform;
    }
    .hero-text { display: flex; flex-direction: column; gap: 16px; position: relative; z-index: 3; padding-top: 32px; }
    .hero-text .hero-greeting,
    .hero-text .hero-role,
    .hero-text .hero-sub,
    .hero-text .hero-slogan { }
    .hero-greeting { font-family: var(--font-display); font-size: clamp(28px, 4vw, 40px); font-weight: 600; letter-spacing: -0.025em; line-height: 1.2; color: var(--fg); }
    .hero-name { font-family: var(--font-display); font-size: clamp(42px, 6.5vw, 68px); font-weight: 600; letter-spacing: -0.03em; line-height: 1.08; color: var(--fg); }
    .hero-role { font-family: var(--font-display); font-size: 20px; font-weight: 500; color: var(--muted); letter-spacing: -0.01em; }
    .hero-sub { font-size: 17px; line-height: 1.65; color: var(--muted); max-width: 440px; }
    .hero-slogan { font-family: var(--font-display); font-size: 18px; font-style: italic; font-weight: 400; color: var(--fg); letter-spacing: 0.01em; }
    .hero-btns { display: flex; gap: 14px; margin-top: 8px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 12px 26px; font-size: 15px; font-weight: 500; letter-spacing: -0.01em;
      border-radius: 100px; transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--fg); color: #fff; }
    .btn-primary:hover { box-shadow: 0 6px 24px rgba(0, 0, 0, 0.15); }
    .btn-secondary { background: var(--card-bg); color: var(--fg); box-shadow: var(--shadow-sm); border: 1px solid var(--card-border); }
    .btn-secondary:hover { box-shadow: var(--shadow-md); background: #fff; }

    /* Hero photos */
    .hero-photos { position: relative; height: 480px; z-index: 3; display: flex; align-items: center; justify-content: center; }
    .hero-photo-stack { position: relative; width: 360px; height: 400px; }
    .hero-photo {
      position: absolute; width: 260px; height: 320px; border-radius: var(--radius-md);
      object-fit: cover; box-shadow: var(--shadow-lg);
      transition: transform 0.5s, z-index 0.5s;
    }
    .hero-photo.p0 { top: 30px; left: 0; z-index: 2; transform: rotate(-2deg); }
    .hero-photo.p1 { top: 60px; left: 60px; z-index: 1; transform: rotate(3deg); }
    @keyframes photoCycle {
      0%, 45% { z-index: 2; }
      50%, 95% { z-index: 1; }
      100% { }
    }
    .hero-photo-stack:hover .hero-photo { transform: rotate(0deg) scale(1.03); z-index: 10; }
    .works-divider {
      margin-top: 56px; padding-top: 24px; padding-bottom: 24px;
      border-top: 1px solid rgba(0,0,0,0.08);
      font-family: var(--font-display);
      font-size: clamp(18px, 2.5vw, 24px);
      font-weight: 600; letter-spacing: -0.015em;
      color: var(--fg);
      scroll-margin-top: var(--nav-h);
    }
    .works-divider-sub {
      font-family: var(--font-display);
      font-size: clamp(28px, 4.5vw, 48px);
      font-weight: 600; letter-spacing: -0.025em; line-height: 1.12;
      color: var(--fg); margin-top: 8px;
    }

    /* Card grid */
    .card-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 24px; scroll-margin-top: calc(var(--nav-h) + 24px);
    }
    .card {
      position: relative; border-radius: var(--radius-md); overflow: hidden;
      box-shadow: var(--shadow-sm); cursor: pointer;
      display: flex; flex-direction: column; justify-content: flex-end;
      min-height: 380px; isolation: isolate;
      transition: transform 0.35s, box-shadow 0.35s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    .card::after {
      content: ''; position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.35) 50%, rgba(0,0,0,0.05) 100%);
      pointer-events: none;
    }
    .card-media-bg {
      position: absolute; inset: 0; z-index: 0;
      object-fit: cover; width: 100%; height: 100%;
      pointer-events: none;
    }
    .card-media-bg.bg-img { background-size: cover; background-position: center; }
    .card-body { position: relative; z-index: 2; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
    .card-title { font-family: var(--font-display); font-size: 21px; font-weight: 600; letter-spacing: -0.015em; line-height: 1.25; color: #fff; }
    .card-desc { font-size: 13.5px; line-height: 1.55; color: rgba(255,255,255,0.78); }
    .breath-circle { width: 60px; height: 60px; border-radius: 50%; background: rgba(180, 210, 195, 0.7); animation: breathe 4s ease-in-out infinite; margin: 0 auto; }
    @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(2.2); opacity: 0.85; } }

    /* Contact */
    .contact-info { display: flex; flex-direction: column; gap: 16px; font-size: 16px; color: var(--fg); }
    .contact-info a { color: var(--fg); font-weight: 500; }
    .contact-email { font-family: var(--font-mono); font-size: 14px; color: var(--fg); }
    /* contact-text shadow removed */

    /* Footer */
    .footer { width: 100%; padding: 32px 40px 48px; border-top: 1px solid rgba(0,0,0,0.06); font-size: 12px; color: var(--muted); letter-spacing: 0.02em; background: rgba(247,248,250,0.94); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); position: relative; z-index: 3; }
    .footer-inner { max-width: 1040px; margin: 0 auto; }

    /* Detail overlay */
    .detail-overlay { position: fixed; top: var(--nav-h); left: 0; right: 0; bottom: 0; z-index: 99; background: var(--bg); overflow-y: auto; display: none; -webkit-overflow-scrolling: touch; }
    .detail-overlay.open { display: block; }
    .detail-inner { max-width: 760px; margin: 0 auto; padding: 80px 40px 120px; }
    .detail-back { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; color: var(--muted); margin-bottom: 36px; cursor: pointer; transition: color 0.2s; }
    .detail-back:hover { color: var(--fg); }
    .detail-back svg { width: 16px; height: 16px; }
    .detail-category { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .detail-title { font-family: var(--font-display); font-size: clamp(28px, 4vw, 40px); font-weight: 600; letter-spacing: -0.025em; line-height: 1.15; color: var(--fg); margin-bottom: 4px; }
    .detail-title-cn { font-size: 16px; color: var(--muted); margin-bottom: 12px; }
    .detail-tagline { font-size: 17px; line-height: 1.6; color: var(--muted); max-width: 560px; margin-bottom: 28px; }
    .detail-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 40px; }
    .detail-meta-block { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius-sm); padding: 16px 18px; }
    .detail-meta-label { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .detail-meta-value { font-size: 13.5px; line-height: 1.5; color: var(--fg); }
    .detail-section { margin-bottom: 32px; }
    .detail-section h3 { font-family: var(--font-display); font-size: 20px; font-weight: 600; letter-spacing: -0.015em; color: var(--fg); margin-bottom: 8px; }
    .detail-section p { font-size: 15px; line-height: 1.7; color: var(--muted); }
    .detail-media-large { width: 100%; min-height: 200px; border-radius: var(--radius-md); background: rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--muted); letter-spacing: 0.02em; margin-bottom: 16px; overflow: hidden; }
    .detail-video { width: 100%; border-radius: var(--radius-md); }
    .detail-pdf-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; font-size: 13px; font-weight: 500; border: 1px solid var(--card-border); border-radius: 8px; color: var(--muted); background: var(--card-bg); transition: border-color 0.2s, color 0.2s; cursor: pointer; }
    .detail-pdf-btn:hover { border-color: rgba(0,0,0,0.18); color: var(--fg); }

    /* Gallery */
    .detail-gallery { display: flex; gap: 0; overflow-x: auto; padding-bottom: 16px; margin-bottom: 24px; scroll-snap-type: x mandatory; }
    .detail-gallery img { flex-shrink: 0; height: 280px; border-radius: var(--radius-sm); scroll-snap-align: start; margin-right: -72px; position: relative; box-shadow: var(--shadow-md); transition: transform 0.3s, z-index 0.3s; }
    .detail-gallery img:nth-child(1) { z-index: 5; } .detail-gallery img:nth-child(2) { z-index: 4; }
    .detail-gallery img:nth-child(3) { z-index: 3; } .detail-gallery img:nth-child(4) { z-index: 2; }
    .detail-gallery img:hover { transform: scale(1.05); z-index: 20 !important; }

    /* Gallery label */
    .gallery-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 12px; }
    .detail-innovation { margin-bottom: 32px; }
    .detail-innovation h3 { margin-bottom: 12px; }
    .innovation-item { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius-sm); padding: 16px 18px; margin-bottom: 12px; }
    .innovation-item h4 { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--fg); margin-bottom: 4px; }
    .innovation-item p { font-size: 13.5px; line-height: 1.6; color: var(--muted); }

    /* PDF viewer */
    .pdf-viewer { width: 100%; margin-bottom: 16px; }
    .pdf-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .pdf-tab { padding: 8px 18px; font-size: 13px; font-weight: 500; border: 1px solid var(--card-border); border-radius: 8px; cursor: pointer; color: var(--muted); background: var(--card-bg); transition: all 0.2s; }
    .pdf-tab.active { background: var(--fg); color: #fff; border-color: var(--fg); }
    .pdf-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .pdf-toolbar button { padding: 6px 14px; font-size: 12px; font-weight: 500; border: 1px solid var(--card-border); border-radius: 6px; cursor: pointer; color: var(--fg); background: var(--card-bg); }
    .pdf-toolbar button:hover { background: #fff; }
    .pdf-toolbar .pdf-open { background: var(--fg); color: #fff; }
    .pdf-toolbar .pdf-open:hover { background: #333; }
    .pdf-zoom-label { font-family: var(--font-mono); font-size: 12px; color: var(--muted); margin-left: auto; }
    .pdf-iframe-wrap { position: relative; overflow: hidden; border: 1px solid var(--card-border); border-radius: var(--radius-sm); background: #fff; }
    .pdf-iframe-wrap iframe { width: 100%; border: 0; display: block; }
    .pdf-watermark { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .pdf-watermark span { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-25deg); font-family: var(--font-display); font-size: 52px; color: rgba(0,0,0,0.04); white-space: nowrap; letter-spacing: 0.3em; font-weight: 600; }

    /* Iframe scaler */
    .iframe-scaler { overflow: hidden; border-radius: var(--radius-sm); border: 1px solid var(--card-border); background: #fff; margin-bottom: 16px; }
    .iframe-scaler iframe { border: 0; transform-origin: top left; }

    /* Innovation points */
    .detail-innovation { margin-bottom: 32px; }

    /* Breathing case study */
    .breath-circle-wrap { display: flex; align-items: center; justify-content: center; padding: 48px 0; background: radial-gradient(circle,var(--green-soft) 0%,rgba(221,239,230,0.3) 60%,transparent 100%); border-radius: var(--radius-md); margin-bottom: 32px; }
    .breath-patterns { display: flex; flex-direction: column; gap: 12px; }
    .breath-pattern-item { display: flex; flex-direction: column; gap: 4px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius-sm); padding: 14px 18px; }
    .bp-name { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--fg); }
    .bp-desc { font-size: 13.5px; line-height: 1.55; color: var(--muted); }
    .breath-ref-img-wrap { border-radius: var(--radius-md); overflow: hidden; margin-bottom: 24px; }
    .breath-ref-img { width: 100%; display: block; }

    @media (max-width: 1024px) {
      .hero { grid-template-columns: 1fr 1fr; gap: 32px; min-height: auto; padding-top: 100px; padding-bottom: 60px; }
      .hero-photos { height: 360px; }
      .hero-photo-stack { width: 280px; height: 340px; }
      .hero-photo { width: 210px; height: 260px; }
      .hero-photo.p0 { top: 20px; left: 0; }
      .hero-photo.p1 { top: 50px; left: 40px; }
      .card { min-height: 320px; }
      .card-grid { grid-template-columns: repeat(2, 1fr); }
      .detail-gallery img { height: 200px; margin-right: -48px; }
    }
    @media (max-width: 768px) {
      .nav { padding: 0 20px; }
      .nav-links { gap: 14px; }
      .nav-links a { font-size: 12px; }
      .nav-lang { font-size: 11px; padding: 3px 8px; }
      .section { padding: 72px 20px; }
      .hero { padding: 100px 20px 48px; grid-template-columns: 1fr 1fr; gap: 20px; }
      .hero-photos { height: 240px; }
      .hero-photo-stack { width: 180px; height: 220px; }
      .hero-photo { width: 140px; height: 180px; border-radius: 14px; }
      .hero-photo.p0 { top: 10px; left: 0; }
      .hero-photo.p1 { top: 30px; left: 28px; }
      .card { min-height: 280px; }
      .card-grid { grid-template-columns: 1fr; }
      .detail-meta { grid-template-columns: 1fr; }
      .detail-inner { padding: 60px 20px 80px; }
      .hero-btns { flex-direction: column; align-items: flex-start; }
      .hero-name { font-size: 32px; }
      .hero-greeting { font-size: 22px; }
      .detail-gallery img { height: 160px; margin-right: -36px; }
      .works-divider-sub { font-size: clamp(22px, 5vw, 32px); }
      .hero-text { padding-top: 16px; }
    }
  </style>
</head>

      window._pdfZoomOut = function () {
        if (pdfZoom <= 50) return; pdfZoom -= 25;
        var pdfIframe = document.getElementById('pdfIframe');
        if (pdfIframe) pdfIframe.style.height = (700 * pdfZoom / 100) + 'px';
        var pdfZoomLabel = document.getElementById('pdfZoomLabel');
        if (pdfZoomLabel) pdfZoomLabel.textContent = pdfZoom + '%';
      };
      window._pdfZoomReset = function () {
        pdfZoom = 100;
        var pdfIframe = document.getElementById('pdfIframe');
        if (pdfIframe) pdfIframe.style.height = '700px';
        var pdfZoomLabel = document.getElementById('pdfZoomLabel');
        if (pdfZoomLabel) pdfZoomLabel.textContent = '100%';
      };

      /* Prevent right-click on PDF */
      var pdfWrap = document.getElementById('pdfWrap');
      if (pdfWrap) { pdfWrap.addEventListener('contextmenu', function (e) { e.preventDefault(); }); }
    }

    function closeDetail() {
      overlay.classList.remove('open');
      body.style.overflow = '';
      var target = document.getElementById(currentTarget || 'work-ai');
      if (target) target.scrollIntoView({ behavior: 'smooth' });
    }

    var currentTarget = null;

    function escapeHTML(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    /* Lang toggle */
    document.getElementById('langToggle').addEventListener('click', function () {
      currentLang = currentLang === 'cn' ? 'en' : 'cn';
      try { localStorage.setItem('portfolio-lang', currentLang); } catch (_) {}
      applyLanguage();
      renderCards();
    });

    /* Photo cycle */
    var photos = document.querySelectorAll('.hero-photo'), photoIdx = 0;
    function cyclePhotos() {
      var order = [[3,2,1],[1,3,2],[2,1,3]];
      var z = order[photoIdx % 3];
      for (var i = 0; i < photos.length; i++) { photos[i].style.zIndex = z[i]; }
      photoIdx++;
    }
    setInterval(cyclePhotos, 3000);

    /* Nav scroll */
    var scrollLinks = document.querySelectorAll('[data-scroll]');
    for (var i = 0; i < scrollLinks.length; i++) {
      scrollLinks[i].addEventListener('click', function (e) {
        e.preventDefault();
        var href = this.getAttribute('href');
        var target = href ? document.querySelector(href) : null;
        if (target) {
          currentTarget = href.replace('#', '');
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    }

    /* Nav + video scroll */
    var nav = document.getElementById('nav'), ticking = false, heroBgVideo = document.getElementById('heroBgVideo');
    function updateNav() {
      if (window.scrollY > 20) nav.classList.add('scrolled'); else nav.classList.remove('scrolled');
      if (heroBgVideo) {
        var progress = Math.min(window.scrollY / window.innerHeight, 1);
        heroBgVideo.style.transform = 'scale(' + (1 + progress * 0.28) + ')';
      }
      ticking = false;
    }
    window.addEventListener('scroll', function () { if (!ticking) { requestAnimationFrame(updateNav); ticking = true; } });

    /* Escape to close detail */
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && overlay.classList.contains('open')) closeDetail();
    });

    /* Resize iframe scaler */
    window.addEventListener('resize', function () {
      var scaler = document.getElementById('iframeScaler');
      if (scaler) {
        var scaleW = scaler.clientWidth / 1440, s = Math.min(1, scaleW);
        scaler.style.height = (900 * s + 24) + 'px';
        var ifr = scaler.querySelector('iframe');
        if (ifr) ifr.style.transform = 'scale(' + s + ')';
      }
    });

    applyLanguage();
    renderCards();
  })();
  </script>
</body>
</html>
